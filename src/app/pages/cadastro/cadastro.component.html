<div class="cadastro-wrapper">
    <div class="cadastro-card">
         <button type="button" class="btn-fechar fechar" (click)="fecharModal.emit()">✕</button>
        <div class="cadastro-inside">
            <span class="scooby-text">Scooby</span><span class="shop-text">Shop🐾</span>
        </div>

        <div class="cadastro-header">
            <h2>Novo detetive na área?</h2>
            <h3>Crie seu crachá de investigação! 🔍</h3>
            <p>Cadastre-se para garantir que nunca faltem Biscoitos Scooby para o seu parceiro.</p>
        </div>

        <form class="cadastro-form">

            <div class="input-group">
                <label for="nome">Nome do Detetive (Seu Nome)</label>
                <input type="text" id="nome" placeholder="Ex: Salsicha Rogers" required>
            </div>

            <div class="input-group">
                <label for="pet-nome">Nome do seu fiel escudeiro (Seu Pet)</label>
                <input type="text" id="pet-nome" placeholder="Ex: Scooby-Doo" required>
            </div>
            
            <div class="input-group">
                <label for="email">E-mail de Contato</label>
                <input type="email" id="email" placeholder="seu-email@misterio.com" required>
            </div>

            <div class="input-group">
                <label for="password">Crie uma Senha Secreta</label>
                <input type="password" id="password" placeholder="Digite uma senha segura..." required>
            </div>

            <div class="lgpd-consent">
                <input type="checkbox" id="privacy-policy" required>
                <label for="privacy-policy">
                    Estou ciente e aceito os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>
                    do ScoobyShop.
                </label>
            </div>


            <div class="login-link">
                <label>
                    Já tem conta? Volte para a van <a href="javascript:void(0)" (click)="irParaLogin.emit()">Aqui</a> 🚐
                </label>
            </div>

            <button type="submit" class="btn-cadastro">Concluir Cadastro 🐾</button>

        </form>
    </div>
</div>
